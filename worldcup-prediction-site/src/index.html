<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07100d" />
    <meta name="description" content="世界杯比赛预测移动端专题站，按比赛、轮次和球队展示赛前模型分析、比分预测与风险提示。" />
    <title>世界杯专题预测</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button" type="button" data-nav="home" aria-label="返回首页">
          <span>⌂</span>
        </button>
        <div class="brand-lockup">
          <strong>世界杯专题预测</strong>
          <span>赛前模型 · 移动端专题</span>
        </div>
        <button class="icon-button" type="button" id="shareButton" aria-label="分享页面">
          <span>↗</span>
        </button>
      </header>

      <main id="app" class="app-main"></main>

      <nav class="bottom-nav" aria-label="主要导航">
        <button type="button" data-nav="home" class="active">
          <span>首页</span>
        </button>
        <button type="button" data-nav="rounds">
          <span>轮次</span>
        </button>
        <button type="button" data-nav="teams">
          <span>球队</span>
        </button>
        <button type="button" data-nav="matches">
          <span>赛程</span>
        </button>
      </nav>
    </div>

    <script src="./data/content.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
